<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IP + GPS Location Finder</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0ea5e9, #6366f1);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%
            }

            50% {
                background-position: 100% 50%
            }

            100% {
                background-position: 0% 50%
            }
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 35px 30px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(18px);
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            animation: floatIn 0.6s ease;
        }

        @keyframes floatIn {
            from {
                transform: translateY(20px);
                opacity: 0
            }

            to {
                transform: translateY(0);
                opacity: 1
            }
        }

        .top {
            text-align: center;
            margin-bottom: 25px;
        }

        .top h1 {
            font-size: 32px;
            font-weight: 700;
        }

        .top p {
            color: #cbd5e1;
            font-size: 13px;
            margin-top: 6px;
        }

        .input-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #e2e8f0;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            outline: none;
            background: rgba(255, 255, 255, 0.10);
            color: #fff;
            transition: 0.25s;
        }

        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.25);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            transition: 0.25s;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(59, 130, 246, 0.35);
        }

        button:active {
            transform: scale(0.98);
        }

        .secondary-btn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }

        button::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            transform: skewX(-20deg);
            transition: 0.4s;
        }

        button:hover::after {
            left: 120%;
        }

        .loader {
            display: none;
            margin-top: 18px;
            text-align: center;
            color: #cbd5e1;
        }

        .dots {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
        }

        .dots span {
            width: 10px;
            height: 10px;
            background: #38bdf8;
            border-radius: 50%;
            animation: bounce 0.6s infinite ease-in-out;
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.7);
        }

        .dots span:nth-child(2) {
            animation-delay: 0.15s;
        }

        .dots span:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
                opacity: 0.5;
            }

            50% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .loader p {
            font-size: 13px;
            animation: fadeText 1.2s infinite;
        }

        @keyframes fadeText {

            0%,
            100% {
                opacity: 0.5
            }

            50% {
                opacity: 1
            }
        }

        .error {
            margin-top: 12px;
            color: #f87171;
            font-size: 13px;
            text-align: center;
        }

        .result {
            margin-top: 20px;
            display: none;
            padding: 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .row:last-child {
            border-bottom: none;
        }

        .key {
            color: #94a3b8;
            font-size: 13px;
        }

        .value {
            font-weight: 600;
            font-size: 13px;
            text-align: right;
            word-break: break-word;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 11px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="top">
            <h1>🌍 IP & GPS Tracker</h1>
            <p>Instant location intelligence system</p>
        </div>
        <div class="input-group">
            <label>Enter IP Address</label>
            <input type="text" id="ip" placeholder="Example: 8.8.8.8">
        </div>
        <button onclick="getLocation()" id="btn">Find IP Location</button>
        <button class="secondary-btn" onclick="autoDetect()">Use My Public IP</button>
        <button class="secondary-btn" onclick="getGPSLocation()">Use My GPS Location</button>
        <div class="loader" id="loader">
            <div class="dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <p>Fetching location...</p>
        </div>
        <div class="error" id="error"></div>
        <div class="result" id="result">
            <div class="row"><span class="key">IP / Source</span><span class="value" id="rip"></span></div>
            <div class="row"><span class="key">Country</span><span class="value" id="country"></span></div>
            <div class="row"><span class="key">Region</span><span class="value" id="region"></span></div>
            <div class="row"><span class="key">City</span><span class="value" id="city"></span></div>
            <div class="row"><span class="key">ZIP</span><span class="value" id="zip"></span></div>
            <div class="row"><span class="key">ISP / Source</span><span class="value" id="isp"></span></div>
            <div class="row"><span class="key">Timezone</span><span class="value" id="timezone"></span></div>
        </div>
        <div class="footer">
            IP + GPS Hybrid Location System
        </div>
    </div>
    <script>
        function isPrivateIP(ip) {
            return (
                ip.startsWith("10.") ||
                ip.startsWith("192.168.") ||
                /^172\.(1[6-9]|2\d|3[0-1])\./.test(ip) ||
                ip === "127.0.0.1" ||
                ip === "::1"
            );
        }
        function showLoader(state) {
            document.getElementById("loader").style.display = state ? "block" : "none";
        }
        async function autoDetect() {
            const error = document.getElementById("error");
            const ipInput = document.getElementById("ip");
            error.innerText = "";
            try {
                const res = await fetch("https://api.ipify.org?format=json");
                const data = await res.json();
                ipInput.value = data.ip;
                getLocation();
            } catch {
                error.innerText = "Unable to detect public IP";
            }
        }
        async function getLocation() {
            const ip = document.getElementById("ip").value.trim();
            const btn = document.getElementById("btn");
            const result = document.getElementById("result");
            const error = document.getElementById("error");
            error.innerText = "";
            result.style.display = "none";
            if (!ip) {
                error.innerText = "Please enter an IP address";
                return;
            }
            if (isPrivateIP(ip)) {
                error.innerText = "Private IP cannot be geolocated. Use GPS instead.";
                return;
            }
            showLoader(true);
            btn.disabled = true;
            try {
                const res = await fetch("/api/ip/getloc", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ ip })
                });
                const response = await res.json();
                showLoader(false);
                btn.disabled = false;
                const data = response.data || response;
                document.getElementById("rip").innerText = data.query || data.ip || "-";
                document.getElementById("country").innerText = data.country || "-";
                document.getElementById("region").innerText = data.regionName || "-";
                document.getElementById("city").innerText = data.city || "-";
                document.getElementById("zip").innerText = data.zip || "-";
                document.getElementById("isp").innerText = data.isp || "-";
                document.getElementById("timezone").innerText = data.timezone || "-";
                result.style.display = "block";
            } catch {
                showLoader(false);
                btn.disabled = false;
                error.innerText = "API error";
            }
        }
        async function getGPSLocation() {
            const result = document.getElementById("result");
            const error = document.getElementById("error");
            error.innerText = "";
            result.style.display = "none";
            if (!navigator.geolocation) {
                error.innerText = "GPS not supported";
                return;
            }
            showLoader(true);
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                try {
                    const res = await fetch(
                        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`
                    );
                    const data = await res.json();
                    showLoader(false);
                    document.getElementById("rip").innerText = "GPS";
                    document.getElementById("country").innerText = data.address?.country || "-";
                    document.getElementById("region").innerText = data.address?.state || "-";
                    document.getElementById("city").innerText = data.address?.city || data.address?.town || "-";
                    document.getElementById("zip").innerText = data.address?.postcode || "-";
                    document.getElementById("isp").innerText = "GPS Location";
                    document.getElementById("timezone").innerText = "-";
                    result.style.display = "block";
                } catch {
                    showLoader(false);
                    error.innerText = "Reverse geocoding failed";
                }
            }, () => {
                showLoader(false);
                error.innerText = "Permission denied or GPS error";
            });
        }
    </script>

</body>

</html>
